<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>em breve...</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F7F3E8;
            color: #4A3A3A; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(220, 150, 150, 0.1);
        }

        .tagline {
            color: #D97B7B; 
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 40px;
        }

        h1 span {
            color: #D97B7B;
        }

        .info-panel {
            font-size: 1.1rem;
            font-weight: 500;
            background-color: #D97B7B;
            color: #FFFFFF;
            padding: 16px 36px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(217, 123, 123, 0.4);
            display: inline-block;
            cursor: default;
            user-select: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <main class="container">
        <span class="tagline">em breve</span>
        
        <h1>uma forma <span>totalmente nova</span> de promover igualdade digital nas escolas.</h1>
        
        <div class="info-panel">
            é no dia <s>15 de março</s> <s>18</s> 19 de março, salve esse link
        </div>
    </main>

</body>
</html>
