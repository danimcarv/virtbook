<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Democratizando os estudos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 1.6rem;
            color: #1a1a1a;
            margin-bottom: 15px;
            line-height: 1.3;
            font-weight: 700;
        }

        p {
            font-size: 1.05rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .cta-button {
            display: inline-block;
            background-color: #0078D4;
            color: white;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 600;
            padding: 16px 24px;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            width: 100%;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.3);
        }

        .cta-button:hover {
            background-color: #005a9e;
            transform: translateY(-2px);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @media (max-width: 380px) {
            h1 {
                font-size: 1.4rem;
            }
            p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><b>Ajude a democratizar o acesso a softwares pesados nas universidades</b></h1>
        <p>Queremos criar uma ferramenta para <b>democratizar</b> o acesso a softwares pesados para quem estuda. <b>Nos ajude a entender melhor como fazer isso.</b></p>
        
        <a href="https://forms.gle/hh3MZsDHz8wJbht3A" class="cta-button" rel="noopener noreferrer">
            Responder pesquisa (1 min)
        </a>
    </div>

</body>
</html>
