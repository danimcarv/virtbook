<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtBook - Encontrar Tenant ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #F7F3E8; color: #4A3A3A; line-height: 1.6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.4); border-radius: 24px; box-shadow: 0 8px 32px rgba(220, 150, 150, 0.1); max-width: 650px; width: 100%; padding: 40px 50px; text-align: left; }
        h2 { color: #D97B7B; font-weight: 700; margin-bottom: 25px; font-size: 1.8rem; text-align: center; line-height: 1.2; }
        ol { margin-left: 20px; margin-bottom: 20px; font-weight: 300; font-size: 1rem; }
        li { margin-bottom: 10px; }
        p { font-weight: 300; font-size: 1rem; margin-top: 20px; }
        strong { font-weight: 500; color: #333; }
        .print-img { max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); margin: 25px auto; display: block; }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Como encontrar meu Tenant ID</h2>
        
        <ol>
            <li>Clique em <strong>"Descobrir meu ID"</strong>.</li>
            <li>Será aberta uma nova guia. Faça login usando sua conta da Microsoft Azure.</li>
            <li>Na tela que será aberta, localize os campos abaixo:</li>
        </ol>

        <img src="https://danimcarv.github.io/virtbook/img/tenant-id.png" alt="Print do Tenant ID na Azure" class="print-img">

        <p><b>Copie seu Tenant ID e cole no VirtBook.</b></p>
    </div>

</body>
</html>
